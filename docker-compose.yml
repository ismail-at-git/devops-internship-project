# Backend + frontend; MongoDB Atlas via backend/.env (MONGO_URI).
# Ensure backend/.env exists (copy from backend/.env.example) before `docker compose up`.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: mern_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: "5000"
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
    ports:
      - "5000:5000"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_API_URL: ""
    container_name: mern_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  app_network:
    driver: bridge
